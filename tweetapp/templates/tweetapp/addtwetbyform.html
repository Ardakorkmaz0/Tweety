{%extends "base.html"%}
{% load static %}

{%block content%}
<h1 class="container text-center">Add tweet</h1>
<div class="container tweetform ">
<form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}


  <!--
  <div class="mb-3">
      {{form.nickname_input.label_tag}} <br>
      {{form.nickname_input}}
      <br>
      {{form.message_input.label_tag}} <br>
      {{form.message_input}}
  </div>
  -->

  {% for field in form %}
          <div class="form-control">
              {{field.label_tag}}
              <br>
              {{field}}
          </div>
          {% endfor %}

          <div class="form-control">
              <label>Images</label>
              <br>
              <input type="file" name="images" multiple>
          </div>

          <br>
          <button type="submit" class="btn btn-primary">Send Tweet</button>
      </form>
  </div>
  {% endblock %}
