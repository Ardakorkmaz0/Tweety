{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto space-y-6">
    <div class="glass-card p-8">
        <h2 class="text-2xl font-bold mb-6 text-center" style="color: var(--neon-green)">Create Group</h2>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block mb-2 font-medium" style="color: var(--text-secondary)">Group Name</label>
                <input type="text" name="name" class="w-full p-3 rounded-xl focus:outline-none transition-all placeholder:text-[var(--text-muted)]" style="background: var(--input); border: 1px solid var(--border-subtle); color: var(--text-primary);" maxlength="50" required>
            </div>
            
            <div>
                <label class="block mb-2 font-medium" style="color: var(--text-secondary)">Description</label>
                <textarea name="description" class="w-full p-3 rounded-xl focus:outline-none transition-all placeholder:text-[var(--text-muted)] min-h-[100px] resize-y" style="background: var(--input); border: 1px solid var(--border-subtle); color: var(--text-primary);" rows="2"></textarea>
            </div>
            
            <div>
                <label class="block mb-2 font-medium" style="color: var(--text-secondary)">Group Image</label>
                <input type="file" name="image" class="w-full p-3 rounded-xl focus:outline-none transition-all" style="background: var(--input); border: 1px solid var(--border-subtle); color: var(--text-primary);" accept="image/*">
            </div>
            
            <div class="pt-2 flex items-center gap-3">
                <input type="checkbox" name="is_private" id="privateCheck" class="w-5 h-5 rounded accent-[var(--neon-green)] focus:ring-[var(--neon-green)] border-[var(--border-subtle)] bg-[var(--input)] cursor-pointer">
                <label for="privateCheck" class="font-medium cursor-pointer selects-none" style="color: var(--text-secondary)">Private (invite only)</label>
            </div>
            
            <div class="pt-6">
                <button type="submit" class="btn-gradient w-full py-3 rounded-xl font-bold text-lg">Create Group</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
