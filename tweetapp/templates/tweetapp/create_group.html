{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 20px;">
    <div class="card">
        <div class="card-body">
            <h3 class="text-center mb-3">Create Group</h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" style="color: #aaa;">Group Name</label>
                    <input type="text" name="name" class="form-control" maxlength="50" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #aaa;">Description</label>
                    <textarea name="description" class="form-control tweetmessage" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #aaa;">Group Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" name="is_private" class="form-check-input" id="privateCheck">
                    <label class="form-check-label" for="privateCheck" style="color: #aaa;">Private (invite only)</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
